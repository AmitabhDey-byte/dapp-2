name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend-and-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32v1-none

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Test Soroban contracts
        run: npm run contracts:test

      - name: Build Soroban contracts
        run: npm run contracts:build

